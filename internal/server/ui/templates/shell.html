{{define "shell.html"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<section class="hero">
  <div class="hero__row">
    <div>
      <h1>Shell</h1>
      <p class="muted">Interactive session proxied over WebSocket.</p>
    </div>
    <div class="hero__actions">
      <a class="btn btn--ghost" href="/ui/clients/{{.Client.ID}}">Back</a>
      <a class="btn btn--ghost" href="/ui/clients/{{.Client.ID}}/exec">Exec</a>
      <a class="btn btn--ghost" href="/ui/clients/{{.Client.ID}}/files">Files</a>
      <a class="btn btn--ghost" href="/ui/clients/{{.Client.ID}}/forwards">Forwards</a>
    </div>
  </div>
</section>

<section class="card">
  <div id="client-meta" data-client-id="{{.Client.ID}}" style="display:none"></div>
  <div class="termx" id="term"></div>
  <div class="row" style="margin-top:10px">
    <button class="btn" type="button" id="connect"><span class="ico ico--terminal" aria-hidden="true"></span>Connect</button>
    <button class="btn btn--ghost" type="button" id="clear"><span class="ico ico--x" aria-hidden="true"></span>Clear</button>
    <span class="hint" id="shell-status"></span>
  </div>
</section>

<link rel="stylesheet" href="/ui/assets/xterm/xterm.css" />
<script src="/ui/assets/xterm/xterm.js"></script>
<script src="/ui/assets/xterm/xterm-addon-fit.js"></script>
<script src="/ui/assets/shell.js"></script>
{{end}}
