{{define "base"}}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{.Base.Title}} · reverse_ssh</title>
    <link rel="stylesheet" href="/ui/assets/app.css" />
  </head>
  <body>
    <div class="layout" id="layout" data-sidebar="open">
      <aside class="sidebar" id="sidebar">
        <a class="brand" href="/ui/" aria-label="Home">
          <span class="brand__dot"></span>
          <span class="brand__text">
            <span class="brand__name">reverse_ssh</span>
            <span class="brand__sub mono">v{{.Base.Version}}</span>
          </span>
        </a>

        <nav class="snav" aria-label="Navigation">
          <a class="snav__link" data-nav href="/ui/">
            <span class="ico ico--users" aria-hidden="true"></span>
            <span>Clients</span>
          </a>
          <a class="snav__link" data-nav href="/ui/build">
            <span class="ico ico--hammer" aria-hidden="true"></span>
            <span>Build</span>
          </a>
          <a class="snav__link" data-nav href="/ui/downloads">
            <span class="ico ico--download" aria-hidden="true"></span>
            <span>Downloads</span>
          </a>
          <a class="snav__link" data-nav href="/ui/forwards">
            <span class="ico ico--arrows" aria-hidden="true"></span>
            <span>Forwards</span>
          </a>
          <a class="snav__link" data-nav href="/ui/webhooks">
            <span class="ico ico--webhook" aria-hidden="true"></span>
            <span>Webhooks</span>
          </a>
        </nav>

        <div class="sidebar__footer">
          <button class="iconbtn" type="button" id="theme-toggle" title="Theme">
            <span class="iconbtn__dot" aria-hidden="true"></span>
            <span class="iconbtn__text">Theme</span>
          </button>
        </div>
      </aside>

      <div class="main">
        <header class="header">
          <div class="wrap">
            <div class="header__left">
              <button class="iconbtn iconbtn--ghost header__burger" type="button" id="sidebar-toggle" aria-label="Toggle navigation">
                <span class="burger" aria-hidden="true"><span></span></span>
              </button>
              <div class="header__title">{{.Base.Title}}</div>
            </div>
            <div class="header__right">
              <span class="meta__pill mono">{{.Base.Now.Format "2006-01-02 15:04:05"}}</span>
            </div>
          </div>
        </header>

        <main class="content">
          <div class="wrap">
            {{template "content" .}}
            <footer class="footer">
              <span>reverse_ssh UI</span>
              <span class="sep">·</span>
              <span class="mono">{{.Base.Now.Format "2006-01-02 15:04:05"}}</span>
            </footer>
          </div>
        </main>
      </div>
    </div>
    <script src="/ui/assets/layout.js"></script>
  </body>
</html>
{{end}}
